name: i18n-sync

# Keeps locale JSON in sync with src/ changes.
# Runs extract + sync + cleanup after every push to master that touches source.
# Does NOT translate — translation requires an AI/human turn.
# If new untranslated keys appear, the job opens an issue with the pending diff.

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ai-localize
        run: npm install -g @ai-localizer/cli

      - name: Extract + sync + cleanup
        run: |
          ai-localize extract --project .
          ai-localize sync --project .
          ai-localize cleanup --project .

      - name: Status
        run: ai-localize status --project .

      - name: Plan pending translations
        run: ai-localize translate plan --project . || true

      - name: Commit locale drift (if any)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/locales package.json
          git diff --cached --quiet || git commit -m 'chore(i18n): sync locale trees'
          git push || echo "nothing to push"

      - name: Upload pending queue for review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-queue
          path: .i18n-queue/
          if-no-files-found: ignore
          retention-days: 14
